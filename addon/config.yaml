---
name: ez-ha
version: 0.0.2
slug: ez-ha-agent
description: AI coding agent with Claude Code — edit HA configs, debug automations, and test dashboards
url: https://github.com/araa47/ez-ha
arch:
    - amd64
    - aarch64
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: mdi:robot
panel_title: ez-ha
map:
    - config:rw
    - ssl:ro
    - share:rw
    - backup:rw
    - media:ro
    - addon_config:rw
hassio_api: true
homeassistant_api: true
auth_api: true
privileged:
    - NET_ADMIN
options:
    anthropic_api_key: ''
    ssh_host: ''
    ssh_port: 22
    ssh_username: root
    expressvpn_enabled: false
    expressvpn_username: ''
    expressvpn_password: ''
    expressvpn_config: ''
schema:
    anthropic_api_key: str?
    ssh_host: str?
    ssh_port: port?
    ssh_username: str?
    expressvpn_enabled: bool?
    expressvpn_username: str?
    expressvpn_password: str?
    expressvpn_config: str?
